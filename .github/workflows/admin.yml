name: Admin App CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            admin:
              - "apps/admin/**"
              - "packages/database/**"
              - "packages/eslint-config/**"
              - "packages/shared/**"
              - "packages/types/**"
              - "packages/typescript-config/**"
              - "turbo.json"
              - "bun.lock"
              - "package.json"
              - ".github/workflows/admin.yml"

  deploy:
    needs: changes
    if: ${{ needs.changes.outputs.admin == 'true' }}
    name: Release to Vercel
    runs-on: ubuntu-latest
    environment: Production
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/setup-environment

      - name: Final Safety Check (Lint, Test)
        run: bun turbo run lint check-types test --filter=admin

      - name: Deploy to Vercel
        uses: ./.github/vercel-deploy
        with:
          vercel_token: ${{ secrets.VERCEL_TOKEN }}
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
          vercel_project_id: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          doppler_token: ${{ secrets.DOPPLER_TOKEN }}

      - name: Apply Expand Migration to Prod DB
        working-directory: packages/database
        run: bun run db:migrate
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
