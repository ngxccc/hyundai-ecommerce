name: Production Deployment

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "*.md"

jobs:
  deploy:
    name: Release to Vercel
    runs-on: ubuntu-latest
    environment: Production
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Final Safety Check (Lint, Test)
        run: bun turbo run lint test

      - name: Pull Vercel Project Settings
        run: bunx vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Apply Expand Migration to Prod DB
        working-directory: packages/database
        run: bun run db:migrate

      - name: Build Project Artifacts
        run: doppler run -- bunx vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy Project Artifacts to Vercel
        run: bunx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
