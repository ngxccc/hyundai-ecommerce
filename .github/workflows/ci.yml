name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "docs/**"

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    environment: Production
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI Pipeline (Lint, Test)
        run: bun turbo run lint test

      - name: Build Project Artifacts
        run: doppler run -- bunx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Apply Expand Migration
        run: cd packages/database && bun run db:migrate

      - name: Deploy Project Artifacts to Vercel
        run: bunx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
