name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Bun thần thánh 🚀
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      # Chạy check toàn bộ monorepo (Tận dụng Turbo Cache)
      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
