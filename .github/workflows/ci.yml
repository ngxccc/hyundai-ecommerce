name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "docs/**"

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    environment: Production
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI Pipeline (Lint, Test)
        run: bun turbo run lint test

      - name: Pull Vercel Environment Information
        run: bunx vercel pull --yes --environment=production --token=$VERCEL_TOKEN --no-sensitive

      - name: Inject Env to Storefront Workspace
        run: cp .vercel/.env.production.local apps/storefront/.env.production.local cat .vercel/.env.production.local

      - name: Build Project Artifacts
        run: bunx vercel build --prod --token=$VERCEL_TOKEN

      - name: Apply Expand Migration
        run: cd packages/database && bun drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy Project Artifacts to Vercel
        run: bunx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
