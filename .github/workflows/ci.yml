name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "docs/**"

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Lint (with ESLint cache)
        run: bun run lint
