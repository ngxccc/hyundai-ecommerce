name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "docs/**"

  permissions:
    contents: write

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" == "dependabot[bot]" ]; then
            echo "Dependabot detected! Unlocking cache..."
            bun install
          else
            echo "Default enforcing frozen lockfile..."
            bun install --frozen-lockfile
          fi

      - name: Lint (with ESLint cache)
        run: bun run lint

      - name: Auto-commit Lockfile (Dependabot Only)
        if: github.actor == 'dependabot[bot]'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bun.lock bun.lockb || true
          git commit -m "chore(deps): sync bun lockfile" || echo "No changes to commit"
          git push
