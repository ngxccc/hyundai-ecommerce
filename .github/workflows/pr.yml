name: PR Check (Lint, Test, Build)

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"

jobs:
  integration:
    name: Code Quality & Dry-run Build
    runs-on: ubuntu-latest
    environment: Staging
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STAGING }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Environment
        uses: ./.github/setup-environment

      - name: Migrate Test Database
        working-directory: packages/database
        run: bun run db:migrate

      - name: Run PR Pipeline (Lint, Test, Build)
        run: bun turbo run lint check-types test build

