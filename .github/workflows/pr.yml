name: PR Check (Lint, Test, Build)

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"

jobs:
  integration:
    name: Code Quality & Dry-run Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: fake
          POSTGRES_PASSWORD: fake
          POSTGRES_DB: hyundai_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    environment: Staging
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STAGING }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/setup-environment

      - name: Push Schema to Ephemeral DB
        run: bun run --cwd packages/database db:push

      - name: Seed CI Database
        run: doppler run -- bun run --cwd packages/database scripts/seed.ts

      - name: Run PR Pipeline (Lint, Test, Build)
        run: doppler run -- bun turbo run lint check-types test build
