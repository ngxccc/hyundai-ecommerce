name: PR Check (Lint, Test, Build)

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"

jobs:
  integration:
    name: Code Quality & Dry-run Build
    runs-on: ubuntu-latest
    environment: Staging
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STAGING || secrets.DOPPLER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/setup-environment

      - name: Migrate Test Database
        run: bun run --cwd packages/database db:migrate

      - name: Seed CI Database
        run: doppler run -- bun run --cwd packages/database scripts/seed.ts

      - name: Run PR Pipeline (Lint, Test, Build)
        run: doppler run -- bun turbo run lint check-types test build
