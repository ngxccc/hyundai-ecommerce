name: PR Check (Lint, Test, Build)

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"

jobs:
  integration:
    name: Code Quality & Dry-run Build
    runs-on: ubuntu-latest
    environment: Staging
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STAGING }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/setup-environment

      - name: Migrate Test Database
        working-directory: packages/database
        run: bun run db:migrate

      - name: Run PR Pipeline (Lint, Test, Build)
        run: bun turbo run lint check-types test build

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: integration
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'
          ignore-unfixed: true
          exit-code: '1'
          cache: 'true'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
