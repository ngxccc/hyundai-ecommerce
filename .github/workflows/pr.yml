name: PR Check (Lint, Test, Build)

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"

jobs:
  integration:
    name: Code Quality & Dry-run Build
    runs-on: ubuntu-latest
    environment: Staging
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STAGING }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Environment
        uses: ./.github/setup-environment

      - name: Migrate Test Database
        working-directory: packages/database
        run: bun run db:migrate

      - name: Run PR Pipeline (Lint, Test, Build)
        run: bun turbo run lint check-types test build

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/storefront/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers & OS Deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps

      - name: Install Playwright OS Deps Only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps

      - name: Run E2E Tests
        working-directory: apps/storefront
        run: bun run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: apps/storefront/playwright-report/
          retention-days: 30
